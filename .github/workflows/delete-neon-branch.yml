name: Delete Neon branch

on:
  delete:
  workflow_dispatch:
    inputs:
      branch_name:
        description: Git branch name to clean up in Neon
        required: true
        type: string
  pull_request:
    types:
      - closed

permissions:
  contents: read

jobs:
  delete-neon-branch:
    name: Delete matching Neon branch
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'delete' && github.event.ref_type == 'branch') ||
      (github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name == github.repository)

    env:
      DELETED_REF: ${{ github.event.ref }}
      DISPATCH_REF: ${{ inputs.branch_name }}
      NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
      NEON_PROJECT_ID: ${{ vars.NEON_PROJECT_ID }}
      NEONCTL_VERSION: 2.24.2
      PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}

    steps:
      - name: Delete matching Neon branch
        shell: bash
        run: |
          set -euo pipefail

          branch_name="${DISPATCH_REF:-${DELETED_REF:-$PR_HEAD_REF}}"

          if [ -z "$branch_name" ]; then
            echo "No branch name found for this event."
            exit 0
          fi

          case "$branch_name" in
            main|master|develop|development|staging|production)
              echo "Skipping protected branch name: $branch_name"
              exit 0
              ;;
          esac

          candidate_names=("$branch_name")
          if [[ "$branch_name" != preview/* ]]; then
            candidate_names+=("preview/$branch_name")
          fi

          candidate_names_json="$(
            printf '%s\n' "${candidate_names[@]}" | jq -R . | jq -s .
          )"

          if [ -z "${NEON_API_KEY:-}" ]; then
            echo "NEON_API_KEY secret is not configured."
            exit 1
          fi

          if [ -z "${NEON_PROJECT_ID:-}" ]; then
            echo "NEON_PROJECT_ID variable is not configured."
            exit 1
          fi

          branches_json="$(npx --yes "neonctl@${NEONCTL_VERSION}" branches list \
            --project-id "$NEON_PROJECT_ID" \
            --api-key "$NEON_API_KEY" \
            --output json \
            --no-analytics \
            --color false)"

          matches="$(jq -r --argjson names "$candidate_names_json" '
            .[]
            | select(.name as $name | $names | index($name))
            | select(.default != true)
            | select(.protected != true)
            | [.id, .name]
            | @tsv
          ' <<< "$branches_json")"

          if [ -z "$matches" ]; then
            echo "No matching non-default Neon branch found for: ${candidate_names[*]}"
            exit 0
          fi

          while IFS=$'\t' read -r branch_id neon_branch_name; do
            npx --yes "neonctl@${NEONCTL_VERSION}" branches delete "$branch_id" \
              --project-id "$NEON_PROJECT_ID" \
              --api-key "$NEON_API_KEY" \
              --output json \
              --no-analytics \
              --color false

            echo "Deleted Neon branch $branch_id ($neon_branch_name) for Git branch: $branch_name"
          done <<< "$matches"
